<label for="station-selector">Station: </label>
<select [(ngModel)]="selectedStation" (ngModelChange)="onStationChange()">
  @for (station of stations; track station.id) {
    <option [value]="station.id">
      {{ station.name }}
    </option>
  }
</select>
<div class="period-selector">
  <fieldset>
    <legend>Period</legend>
    <label for="latest-day"
      >1 Day
      <input
        type="radio"
        id="latest-day"
        name="period"
        value="1"
        [(ngModel)]="selectedPeriod"
        (ngModelChange)="onPeriodChange()"
    /></label>

    <label for="latest-week"
      >7 Days
      <input
        type="radio"
        id="latest-week"
        name="period"
        value="7"
        [(ngModel)]="selectedPeriod"
        (ngModelChange)="onPeriodChange()"
    /></label>

    <label for="latest-month"
      >30 Days
      <input
        type="radio"
        id="latest-month"
        name="period"
        value="30"
        [(ngModel)]="selectedPeriod"
        (ngModelChange)="onPeriodChange()"
    /></label>

    <label for="latest-months"
      >Latest months
      <input
        type="radio"
        id="latest-months"
        name="period"
        value="latest-months"
        [(ngModel)]="selectedPeriod"
        (ngModelChange)="onPeriodChange()"
    /></label>
  </fieldset>
</div>
@if (error) {
  <div class="error" role="alert">{{ error }}</div>
}
@if (chartOptions) {
  <div role="img" aria-label="Temperature chart showing data for the selected station and period">
    <highcharts-chart
      aria-live="polite"
      [options]="chartOptions"
      style="width: 100%; height: 400px; display: block"
    ></highcharts-chart>
  </div>
}
